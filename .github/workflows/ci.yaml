name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-and-quality
      - run: dotnet restore Opencode.Telemetry.slnx
      - run: dotnet build Opencode.Telemetry.slnx --no-restore --configuration Release
      - run: dotnet test Opencode.Telemetry.slnx --no-build --configuration Release
      - uses: github/codeql-action/analyze@v4
        with:
          category: "code-scanning:backend"

      - name: Lowercase repository name
        id: repo
        run: echo "repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/opencode.telemetry.api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.repo }}/telemetry-api:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.repo }}/telemetry-api:latest

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ghcr.io/${{ steps.repo.outputs.repo }}/telemetry-api:${{ github.sha }}
          containerAppName: ${{ vars.AZURE_CONTAINER_APP_NAME }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_PAT }}
          environmentVariables: |
            ASPNETCORE_ENVIRONMENT=Production
            ASPNETCORE_URLS=http://+:8080
            COSMOS_CONNECTION_STRING=secretref:cosmos-connection-string
            APPLICATIONINSIGHTS_CONNECTION_STRING=secretref:appinsights-connection-string
            StudentContextKey=default-student

      - name: Notify CI/CD Review Agent on Failure
        if: failure()
        run: |
          curl -X POST https://ca-adlc-unified-agent.ashyocean-2579666a.westus2.azurecontainerapps.io/api/pipeline/review/github \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "run_id": "${{ github.run_id }}",
              "repository": "${{ github.repository }}",
              "commit_sha": "${{ github.sha }}"
            }'

      - name: Trigger PR Code Review
        id: code-review
        if: github.event_name == 'pull_request' && always()
        run: |
          response=$(curl -s -X POST https://ca-adlc-unified-agent.ashyocean-2579666a.westus2.azurecontainerapps.io/api/code-review/review/github \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "pull_request_number": ${{ github.event.pull_request.number }},
              "commit_sha": "${{ github.event.pull_request.head.sha }}"
            }')
          echo "Code Review response: $response"
          report_id=$(echo "$response" | jq -r '.agent_report.report_id // .agent_report.id // empty')
          echo "report_id=$report_id" >> $GITHUB_OUTPUT

      - name: Trigger Critic Review
        if: github.event_name == 'pull_request' && always() && steps.code-review.outputs.report_id != ''
        run: |
          curl -X POST https://ca-adlc-unified-agent.ashyocean-2579666a.westus2.azurecontainerapps.io/api/critic/review/github \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d '{
              "repository": "${{ github.repository }}",
              "pull_request_number": ${{ github.event.pull_request.number }},
              "commit_sha": "${{ github.event.pull_request.head.sha }}",
              "code_review_report_id": "${{ steps.code-review.outputs.report_id }}"
            }'
