<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>FBM Pipeline — Critical Failure</title>
</head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #333;">
  <h2 style="color: #d32f2f; border-bottom: 2px solid #d32f2f; padding-bottom: 8px;">
    FBM Pipeline — Critical Failure
  </h2>
  <table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
    <tr style="background: #f5f5f5;">
      <td style="padding: 10px 12px; font-weight: bold; width: 140px;">Run ID</td>
      <td style="padding: 10px 12px; font-family: monospace;">{{pipelineRunId}}</td>
    </tr>
    <tr>
      <td style="padding: 10px 12px; font-weight: bold;">Module</td>
      <td style="padding: 10px 12px;">{{module}}</td>
    </tr>
    <tr style="background: #f5f5f5;">
      <td style="padding: 10px 12px; font-weight: bold;">Error</td>
      <td style="padding: 10px 12px; color: #d32f2f;">{{error}}</td>
    </tr>
    <tr>
      <td style="padding: 10px 12px; font-weight: bold;">Timestamp</td>
      <td style="padding: 10px 12px;">{{timestamp}}</td>
    </tr>
  </table>
  <p style="color: #999; font-size: 11px; margin-top: 32px; border-top: 1px solid #eee; padding-top: 12px;">
    FBM Order Fulfillment Pipeline — automated alert. Do not reply to this message.
  </p>
</body>
</html>
